# 1. 核心 TUN 配置：强制锁定 10.6.0.1
tun:
  enable: true
  # 必须使用 system 栈，才能正确绑定虚拟接口
  stack: system
  # 强制指定回环地址为 10.6.0.1
  loopback-address:
    - 10.6.0.1
  # 开启自动路由，确保流量正确转发
  auto-route: true
  auto-detect-interface: true

# 2. 关键 DNS 配置 (与 TUN 同级)
# 必须使用与 Clash 回环同网段的地址，防止 DNS 泄露
dns:
  enable: true
  listen: 10.6.0.1:53
  # 使用可靠的 DNS 服务器
  nameserver:
    - 223.5.5.5
    - 223.6.6.6
  # 伪造 IP 范围，务必避开 10.x 段
  fake-ip-range: 198.18.0.1/16

# 3. 必加防火墙规则：保护局域网不被代理
# 这一步至关重要，防止你访问路由器后台时走代理
rules:
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT